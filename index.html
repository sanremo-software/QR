<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>POS - Eiscafé San Remo | Caixa Registadora</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    }
    body {
      background: #f5f2e8;
      margin: 0;
      padding: 20px;
    }
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Header */
    .header {
      background: #2e241f;
      color: #f9e0b0;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.7rem;
      letter-spacing: -0.5px;
      font-weight: 600;
    }
    .header small {
      font-size: 0.8rem;
      color: #e6cba0;
    }
    /* Main 2 colunas */
    .pos-main {
      display: flex;
      flex-wrap: wrap;
    }
    .products-panel {
      flex: 2;
      min-width: 260px;
      background: #fffef7;
      border-right: 1px solid #eee2d0;
      padding: 20px;
    }
    .cart-panel {
      flex: 1.2;
      min-width: 300px;
      background: #fefaf5;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    /* Busca */
    .search-box {
      margin-bottom: 20px;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #e9ddce;
      border-radius: 44px;
      background: white;
      transition: 0.2s;
      outline: none;
    }
    .search-box input:focus {
      border-color: #c47a44;
      box-shadow: 0 0 0 2px rgba(196,122,68,0.2);
    }
    /* filtros categoria */
    .category-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .cat-btn {
      background: #f0e7dc;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #4a3729;
      cursor: pointer;
      transition: 0.1s;
    }
    .cat-btn.active {
      background: #c47a44;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    /* grade produtos */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 6px;
    }
    .product-card {
      background: white;
      border-radius: 20px;
      border: 1px solid #f0e2d4;
      padding: 12px 10px;
      transition: 0.1s ease;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .product-card:hover {
      border-color: #c47a44;
      background: #fff9f2;
      transform: scale(0.98);
    }
    .product-name {
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.3;
      color: #2c241e;
      margin-bottom: 8px;
      word-break: break-word;
    }
    .product-price {
      font-weight: 700;
      color: #b45f2b;
      font-size: 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .price-euro {
      font-size: 0.9rem;
      font-weight: 500;
    }
    .add-btn {
      background: #2e241f;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    .add-btn:active {
      background: #c47a44;
    }
    /* carrinho */
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px solid #eedbcb;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .cart-header h2 {
      font-size: 1.5rem;
      margin: 0;
      color: #2e241f;
    }
    .clear-cart {
      background: none;
      border: none;
      color: #a16234;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .cart-items {
      flex: 1;
      max-height: 55vh;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-radius: 20px;
      padding: 8px 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px #e2d4c8;
    }
    .cart-item-info {
      flex: 3;
    }
    .cart-item-name {
      font-weight: 500;
      font-size: 0.85rem;
    }
    .cart-item-price {
      font-size: 0.75rem;
      color: #b45f2b;
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f9f1e8;
      padding: 4px 10px;
      border-radius: 40px;
    }
    .qty-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      width: 26px;
      cursor: pointer;
      color: #5e3e2a;
    }
    .qty-num {
      font-weight: 600;
      min-width: 24px;
      text-align: center;
    }
    .cart-item-total {
      font-weight: 700;
      margin-left: 12px;
      min-width: 60px;
      text-align: right;
      color: #2e241f;
    }
    .remove-item {
      background: none;
      border: none;
      font-size: 1.2rem;
      margin-left: 8px;
      cursor: pointer;
      color: #bf7b48;
    }
    .cart-footer {
      border-top: 2px dashed #eedbcb;
      padding-top: 16px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.4rem;
      font-weight: 800;
      margin: 12px 0;
    }
    .checkout-btn {
      background: #2e7d5e;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 44px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    .checkout-btn:active {
      background: #1f5c44;
    }
    .empty-cart {
      text-align: center;
      color: #ab8e72;
      padding: 32px 0;
    }
    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 12px;
      background: #f3ede5;
      color: #7f6242;
    }
    @media (max-width: 780px) {
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
      .product-name {
        font-size: 0.8rem;
      }
    }
  </style>
</head>

    { name: "💧 Mineralwasser S.Pellegrino (0,25l)", price: 2.40, category: "Softdrinks" },
    { name: "💧 Mineralwasser S.Pellegrino (0,75l)", price: 5.90, category: "Softdrinks" },
    { name: "🍇 Wild Berry (0,2l)", price: 2.20, category: "Softdrinks" },
    { name: "🍸 Tonic Water (0,2l)", price: 2.20, category: "Softdrinks" },
    { name: "🍷 Rotwein, trocken (0,2l)", price: 4.90, category: "Wein" },
    { name: "🥂 Weißwein, trocken (0,2l)", price: 4.90, category: "Wein" },
    { name: "🍾 Campari Sekt (0,2l)", price: 3.90, category: "Wein" },
    { name: "🥂 Glas Sekt (0,1l)", price: 3.90, category: "Wein" },
    { name: "🍹 Rosato Bella (Aperitif)", price: 7.00, category: "Aperitif" },
    { name: "🍹 Rosato Mio", price: 7.00, category: "Aperitif" },
    { name: "🍹 Rosato Duo", price: 7.00, category: "Aperitif" },
    { name: "🍸 Aperol (4cl)", price: 7.00, category: "Spirituosen" },
    { name: "🍹 Hugo (4cl)", price: 7.00, category: "Spirituosen" },
    { name: "🥃 Grappa (4cl)", price: 4.70, category: "Spirituosen" },
    { name: "🥃 Amaretto (4cl)", price: 3.20, category: "Spirituosen" },
    { name: "🍸 Lilet (4cl)", price: 7.00, category: "Spirituosen" }
  ];

  // categoria única e ordenada
  const categoriesSet = new Set();
  PRODUCTS.forEach(p => categoriesSet.add(p.category));
  const CATEGORIES = ["Todos", ...Array.from(categoriesSet).sort()];
  
  let activeCategory = "Todos";
  let searchTerm = "";
  let cart = []; // { id, product, quantity }
  let nextId = 1;
  
  // helpers
  function formatPrice(price) {
    return price.toFixed(2).replace('.', ',') + " €";
  }
  
  function renderProducts() {
    const grid = document.getElementById("productsGrid");
    const filtered = PRODUCTS.filter(p => {
      const matchCat = activeCategory === "Todos" || p.category === activeCategory;
      const matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase());
      return matchCat && matchSearch;
    });
    if (filtered.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Nenhum produto encontrado 🔍</div>';
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <div class="product-card" data-name="${p.name.replace(/"/g, '&quot;')}" data-price="${p.price}">
        <div class="product-name">${p.name}</div>
        <div class="product-price">
          <span>${formatPrice(p.price)}</span>
          <button class="add-btn" data-name="${p.name.replace(/"/g, '&quot;')}" data-price="${p.price}">+ Adicionar</button>
        </div>
      </div>
    `).join('');
    // eventos dos botoes
    document.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const name = btn.getAttribute('data-name');
        const price = parseFloat(btn.getAttribute('data-price'));
        addToCart(name, price);
      });
    });
  }
  
  function addToCart(name, price) {
    const existing = cart.find(item => item.product.name === name && item.product.price === price);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ id: nextId++, product: { name, price }, quantity: 1 });
    }
    renderCart();
  }
  
  function renderCart() {
    const container = document.getElementById("cartItemsContainer");
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart">🛒 Carrinho vazio. Selecione produtos ao lado.</div>';
      document.getElementById("cartTotal").innerText = "0,00 €";
      return;
    }
    let total = 0;
    container.innerHTML = cart.map(item => {
      const subtotal = item.product.price * item.quantity;
      total += subtotal;
      return `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.product.name}</div>
            <div class="cart-item-price">${formatPrice(item.product.price)}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn decr" data-id="${item.id}">−</button>
            <span class="qty-num">${item.quantity}</span>
            <button class="qty-btn incr" data-id="${item.id}">+</button>
          </div>
          <div class="cart-item-total">${formatPrice(subtotal)}</div>
          <button class="remove-item" data-id="${item.id}">🗑️</button>
        </div>
      `;
    }).join('');
    document.getElementById("cartTotal").innerHTML = formatPrice(total);
    // eventos
    document.querySelectorAll('.decr').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        updateQuantity(id, -1);
      });
    });
    document.querySelectorAll('.incr').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        updateQuantity(id, 1);
      });
    });
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        removeCartItem(id);
      });
    });
  }
  
  function updateQuantity(id, delta) {
    const idx = cart.findIndex(i => i.id === id);
    if (idx !== -1) {
      const newQty = cart[idx].quantity + delta;
      if (newQty <= 0) {
        cart.splice(idx, 1);
      } else {
        cart[idx].quantity = newQty;
      }
      renderCart();
    }
  }
  
  function removeCartItem(id) {
    cart = cart.filter(i => i.id !== id);
    renderCart();
  }
  
  function clearCart() {
    cart = [];
    renderCart();
  }
  
  function checkout() {
    if (cart.length === 0) {
      alert("🛎️ Carrinho vazio! Adicione produtos para finalizar.");
      return;
    }
    const total = cart.reduce((sum, i) => sum + (i.product.price * i.quantity), 0);
    alert(`🧾 Venda finalizada!\nTotal: ${formatPrice(total)}\nObrigado pelo pedido! 🍦`);
    clearCart();
  }
  
  // eventos UI
  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    renderProducts();
  });
  document.getElementById("clearCartBtn").addEventListener("click", clearCart);
  document.getElementById("checkoutBtn").addEventListener("click", checkout);
  
  function buildCategoryButtons() {
    const container = document.getElementById("categoryFilters");
    container.innerHTML = CATEGORIES.map(cat => `
      <button class="cat-btn ${activeCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>
    `).join('');
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.getAttribute('data-cat');
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts();
      });
    });
  }
  
  buildCategoryButtons();
  renderProducts();
  renderCart();
</script>
</body>
</html>
